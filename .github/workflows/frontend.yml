name: Frontend CI

on:
  push:
    paths:
      - "frontend/**"
      - "src/mediarefinery/service/web.py"
      - ".github/workflows/frontend.yml"
  pull_request:
    paths:
      - "frontend/**"
      - "src/mediarefinery/service/web.py"
      - ".github/workflows/frontend.yml"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          # Node 24 is the current LTS line (winget's OpenJS.NodeJS.LTS
          # resolves here). Phase F's Dockerfile will use node:24-alpine
          # for the frontend build stage to match.
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build dashboard bundle
        run: npm run build

      - name: Assert bundle was emitted
        run: test -f ../src/mediarefinery/web/index.html

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-bundle
          path: src/mediarefinery/web/
          if-no-files-found: error
          retention-days: 7
